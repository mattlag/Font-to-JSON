# Deploy demo site to personal website via SFTP
#
# Triggers when a GitHub Release is published.
# Builds the demo + docs, then uploads demo/dist/ to your web server via SFTP.
#
# Prerequisites — add these as Repository Secrets (Settings → Secrets → Actions):
#   1. SFTP_HOST     — hostname (e.g. glyphrstudio.com)
#   2. SFTP_USERNAME — your SSH/SFTP login
#   3. SFTP_PASSWORD — your SSH/SFTP password
#   4. SFTP_PATH     — remote directory (e.g. /home/user/public_html/fontfluxjs)

name: Deploy Demo to Website

on:
  release:
    types: [published]

  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: read

# Only one deployment at a time
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build library
        run: npm run build

      - name: Build demo site + docs
        run: npm run site:build

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: ./demo/dist/
          remote_path: ${{ secrets.SFTP_PATH }}/
